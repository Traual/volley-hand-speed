<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Volley Hand Speed</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Écran d'accueil -->
    <section id="home" class="screen">
      <h1>🏐 Volley Hand Speed</h1>
      <p class="sub">Vitesse de pointe du poignet, en direct.</p>

      <label class="field">Ta taille (cm)
        <input id="heightCm" type="number" value="188" min="120" max="220" inputmode="numeric" />
      </label>

      <div class="field">Main frappeuse
        <div class="seg">
          <button class="seg-btn active" data-hand="right">Droite</button>
          <button class="seg-btn" data-hand="left">Gauche</button>
        </div>
      </div>

      <button id="startBtn" class="primary">Démarrer la caméra</button>
      <p class="hint">Pose le téléphone de profil, recule de 3-5 m pour qu'on te voie
        <b>en entier</b>. Caméra arrière. Aucune donnée n'est envoyée — tout reste sur ton tél.</p>
      <p id="homeErr" class="err"></p>
    </section>

    <!-- Écran mesure -->
    <section id="live" class="screen hidden">
      <div class="stage">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="overlay"></canvas>

        <div id="hud">
          <div class="peak">
            <div class="peak-num"><span id="peakVal">0.0</span><small>m/s</small></div>
            <div class="peak-kmh"><span id="peakKmh">0</span> km/h · PIC</div>
          </div>
          <div class="live-row">
            <span id="liveVal">0.0</span> m/s <span class="dim">live</span>
          </div>
          <div id="status" class="status">Initialisation du modèle…</div>
        </div>
      </div>

      <div class="controls">
        <button id="resetBtn" class="primary">Nouveau swing</button>
        <button id="stopBtn" class="ghost">Arrêter</button>
      </div>
    </section>
  </div>

  <!-- TensorFlow.js + MoveNet (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
